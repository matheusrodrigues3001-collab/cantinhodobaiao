<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loja Express</title>

<style>
* {margin:0;padding:0;box-sizing:border-box;}

body {
    font-family: 'Segoe UI', sans-serif;
    background: #0f172a;
    color: #fff;
}

/* HEADER */
header {
    background: linear-gradient(90deg,#020617,#1e293b);
    padding: 20px;
    text-align: center;
}

header img {
    width: 80px;
    margin-bottom: 10px;
}

header h1 {
    font-size: 24px;
}

/* BUSCA */
.search {
    padding: 15px;
}

.search input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
}

/* GRID */
.container {
    padding: 15px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
    gap: 15px;
}

/* CARD */
.card {
    background: #1e293b;
    border-radius: 15px;
    overflow: hidden;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.03);
}

.card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
}

.card-content {
    padding: 10px;
}

.price {
    color: #4ade80;
    font-weight: bold;
}

/* BOTÃO */
.btn {
    display: block;
    margin-top: 10px;
    padding: 10px;
    text-align: center;
    background: #16a34a;
    color: white;
    text-decoration: none;
    border-radius: 8px;
}

/* WHATSAPP */
.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    padding: 15px;
    border-radius: 50%;
    font-size: 20px;
    text-decoration: none;
}

/* RODAPÉ */
footer {
    text-align: center;
    padding: 15px;
    color: #94a3b8;
}
</style>

<script>
function buscar() {
    let input = document.getElementById("search").value.toLowerCase();
    let cards = document.getElementsByClassName("card");

    for (let i = 0; i < cards.length; i++) {
        let texto = cards[i].innerText.toLowerCase();
        cards[i].style.display = texto.includes(input) ? "block" : "none";
    }
}
</script>

</head>

<body>

<header>
    <!-- TROCAR LOGO AQUI -->
    <img src="https://via.placeholder.com/80" alt="logo">
    <h1>Nome da Loja</h1>
    <p>Peça rápido pelo WhatsApp</p>
</header>

<div class="search">
<input type="text" id="search" onkeyup="buscar()" placeholder="🔎 Buscar produto...">
</div>

<div class="container">

<!-- PRODUTO -->
<div class="card">
<img src="https://source.unsplash.com/300x200/?battery">
<div class="card-content">
<h3>Bateria 2032</h3>
<p class="price">R$ 6,00</p>
<a class="btn" href="https://wa.me/5521980207409?text=Olá,%20quero%20comprar%20Bateria%202032.%20Pode%20me%20passar%20mais%20detalhes?">Comprar</a>
</div>
</div>

<div class="card">
<img src="https://source.unsplash.com/300x200/?charger">
<div class="card-content">
<h3>Carregador Turbo</h3>
<p class="price">R$ 40,00</p>
<a class="btn" href="https://wa.me/5521980207409?text=Olá,%20quero%20comprar%20Carregador%20Turbo">Comprar</a>
</div>
</div>

<div class="card">
<img src="https://source.unsplash.com/300x200/?usb-cable">
<div class="card-content">
<h3>Cabo USB Tipo C</h3>
<p class="price">R$ 20,00</p>
<a class="btn" href="https://wa.me/5521980207409?text=Olá,%20quero%20comprar%20Cabo%20USB">Comprar</a>
</div>
</div>

<div class="card">
<img src="https://source.unsplash.com/300x200/?mouse">
<div class="card-content">
<h3>Mouse Sem Fio</h3>
<p class="price">R$ 30,00</p>
<a class="btn" href="https://wa.me/5521980207409?text=Olá,%20quero%20comprar%20Mouse">Comprar</a>
</div>
</div>

<div class="card">
<img src="https://source.unsplash.com/300x200/?thermometer">
<div class="card-content">
<h3>Termômetro</h3>
<p class="price">R$ 15,00</p>
<a class="btn" href="https://wa.me/5521980207409?text=Olá,%20quero%20comprar%20Termômetro">Comprar</a>
</div>
</div>

</div>

<footer>
💳 Cartões a partir de R$10 • Pix disponível
</footer>

<a class="whatsapp" href="https://wa.me/5521980207409">💬</a>

</body>
</html>
